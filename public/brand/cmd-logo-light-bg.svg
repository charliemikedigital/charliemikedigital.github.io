<?xml version="1.0" encoding="UTF-8"?>
<!--
  Charlie Mike Digital — primary logo lockup (full color)
  USE ON: light or white backgrounds (email signatures, white letterhead, light biz cards)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110" role="img" aria-label="Charlie Mike Digital">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd79a"/>
      <stop offset="50%" stop-color="#f5b84a"/>
      <stop offset="100%" stop-color="#ff6a5f"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1a20"/>
      <stop offset="100%" stop-color="#0d0c10"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- ===== Mark (80x80 starting at x=10, y=15) ===== -->
  <g transform="translate(10, 15) scale(1.25)">
    <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#ink)" stroke="url(#warm)" stroke-width="1.25"/>
    <path d="M10 22 L32 10 L54 22" stroke="url(#warm)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
    <path d="M14 28 L32 18 L50 28" stroke="url(#warm)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
    <path d="M30 38 C 26 38 22 42 22 46 C 22 50 26 54 30 54" stroke="#efeae0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M34 54 L34 38 L38 46 L42 38 L42 54" stroke="#efeae0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="14" r="1.5" fill="#ff3b2e"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="118" y="62" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="38" fill="#0d0c10" letter-spacing="-0.5">
    Charlie <tspan fill="url(#warm)">Mike</tspan>
  </text>
  <text x="120" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#54504a" letter-spacing="5">DIGITAL</text>
</svg>
