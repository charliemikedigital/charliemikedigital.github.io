<?xml version="1.0" encoding="UTF-8"?>
<!--
  Charlie Mike Digital — primary logo lockup (cream / inverse)
  USE ON: dark backgrounds (dark email themes, dark biz cards, dark social headers)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110" role="img" aria-label="Charlie Mike Digital">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd79a"/>
      <stop offset="50%" stop-color="#f5b84a"/>
      <stop offset="100%" stop-color="#ff6a5f"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- ===== Mark — no square, all cream chevron + CM + red target ===== -->
  <g transform="translate(10, 15) scale(1.25)">
    <!-- Hairline ring around the mark area for visual containment -->
    <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="url(#warm)" stroke-width="1.25" stroke-opacity="0.55"/>
    <path d="M10 22 L32 10 L54 22" stroke="url(#warm)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M14 28 L32 18 L50 28" stroke="url(#warm)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
    <path d="M30 38 C 26 38 22 42 22 46 C 22 50 26 54 30 54" stroke="#efeae0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M34 54 L34 38 L38 46 L42 38 L42 54" stroke="#efeae0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="14" r="1.5" fill="#ff3b2e"/>
  </g>

  <!-- ===== Wordmark — paper / cream tone for dark backdrops ===== -->
  <text x="118" y="62" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="38" fill="#efeae0" letter-spacing="-0.5">
    Charlie <tspan fill="url(#warm)">Mike</tspan>
  </text>
  <text x="120" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a39b8d" letter-spacing="5">DIGITAL</text>
</svg>
